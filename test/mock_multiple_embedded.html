<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>超星学习通多卡片混嵌模拟页面</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
      background-color: #f8fafc;
      overflow: hidden;
    }
    #sidebar {
      width: 280px;
      background-color: #0f172a;
      color: white;
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #1e293b;
    }
    #sidebar h2 {
      font-size: 16px;
      margin-bottom: 25px;
      text-align: center;
      color: #3b82f6;
      font-weight: 700;
    }
    .catalog-item {
      padding: 12px 15px;
      margin-bottom: 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
      font-size: 13px;
      color: #94a3b8;
    }
    .catalog-item:hover {
      background-color: #1e293b;
      color: #f8fafc;
    }
    .catalog-item.posCatalog_active {
      background-color: #3b82f6;
      color: white;
      font-weight: bold;
    }
    #content-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 40px;
      overflow-y: auto;
    }
    h1 {
      font-size: 20px;
      color: #1e293b;
      margin-bottom: 20px;
    }
    .card-container {
      background-color: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      position: relative;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 15px;
      font-weight: 600;
      color: #334155;
      font-size: 15px;
      border-bottom: 1px solid #f1f5f9;
      padding-bottom: 10px;
    }
    .ans-job-icon {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background-color: #f59e0b; /* Yellow for waiting/incomplete */
      transition: background-color 0.3s;
    }
    .ans-job-icon-finished {
      background-color: #10b981 !important; /* Green for finished */
    }
    .iframe-wrapper {
      width: 100%;
      height: 380px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <h2>课程目录 (Catalog)</h2>
    <div class="catalog-item posCatalog_active" id="ch-1" onclick="switchChapter(1)">第一章：医学数据管理基础（当前）</div>
    <div class="catalog-item posCatalog_select" id="ch-2" onclick="switchChapter(2)">第二章：数据建模与分析进阶</div>
    <div class="catalog-item posCatalog_select" id="ch-3" onclick="switchChapter(3)">第三章：终章与自我评估</div>
  </div>

  <div id="content-pane">
    <h1 id="chapter-title">第一章：医学数据管理基础</h1>

    <!-- Card 1: Top Video -->
    <div class="card-container" id="card-video1">
      <div class="card-header">
        <span class="ans-job-icon" id="icon-video1"></span>
        <span>任务点 1：引言与解剖学概念 (视频)</span>
      </div>
      <div class="iframe-wrapper">
        <iframe id="iframe-video1" src="/test/mock_video.html?id=video1"></iframe>
      </div>
    </div>

    <!-- Card 2: Middle PDF/PPT -->
    <div class="card-container" id="card-ppt">
      <div class="card-header">
        <span class="ans-job-icon" id="icon-ppt"></span>
        <span>任务点 2：解剖学图谱深度阅读 (课件)</span>
      </div>
      <div class="iframe-wrapper">
        <iframe id="iframe-ppt" src="/test/mock_ppt.html"></iframe>
      </div>
    </div>

    <!-- Card 3: Bottom Video -->
    <div class="card-container" id="card-video2">
      <div class="card-header">
        <span class="ans-job-icon" id="icon-video2"></span>
        <span>任务点 3：细胞学机能解析 (视频)</span>
      </div>
      <div class="iframe-wrapper">
        <iframe id="iframe-video2" src="/test/mock_video.html?id=video2"></iframe>
      </div>
    </div>
  </div>

  <script>
    let currentChapter = 1;

    // Listen for messages from sub-frames to simulate task completion state changes
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'CX_TASK_COMPLETED') {
        console.log(`[Top Context] Received completion event`, e.data);
        
        // Find which iframe sent the message by traversing same-origin iframes
        const iframes = document.querySelectorAll('iframe');
        for (const iframe of iframes) {
          try {
            if (iframe.contentWindow === e.source) {
              const card = iframe.closest('.card-container');
              if (card) {
                const icon = card.querySelector('.ans-job-icon');
                if (icon) {
                  icon.classList.add('ans-job-icon-finished');
                  console.log(`[Top Context] Successfully marked task completed in DOM for: ${card.id}`);
                }
              }
            }
          } catch (err) {}
        }
      }
    });

    function switchChapter(num) {
      currentChapter = num;
      document.querySelectorAll('.catalog-item').forEach(item => {
        item.className = 'catalog-item posCatalog_select';
      });
      document.getElementById(`ch-${num}`).className = 'catalog-item posCatalog_active';
      document.getElementById('chapter-title').innerText = document.getElementById(`ch-${num}`).innerText.replace('（当前）', '');
      
      // Reset all icons to incomplete (yellow)
      document.querySelectorAll('.ans-job-icon').forEach(icon => {
        icon.classList.remove('ans-job-icon-finished');
      });

      // Reload iframes to simulate loading new tasks
      document.getElementById('iframe-video1').src = '/test/mock_video.html?id=video1&r=' + Math.random();
      document.getElementById('iframe-ppt').src = '/test/mock_ppt.html?r=' + Math.random();
      document.getElementById('iframe-video2').src = '/test/mock_video.html?id=video2&r=' + Math.random();
      
      console.log(`[Top Context] Switched to Chapter ${num}`);
    }
  </script>
</body>
</html>
